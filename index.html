<!DOCTYPE html>
<html lang="uk">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JRWRQLN2H5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JRWRQLN2H5');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поблизу: Гід ЖК Нова Англія</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="Poblyzu_logo.png" alt="Поблизу" class="main-logo">
        </div>

        <input type="text" id="searchInput" placeholder="Шукати заклади..." onkeyup="filterData()">
        
        <div class="filters-container">
            <div class="category-filters">
                <button class="f-btn active" onclick="setCategory('Всі', this)">Всі</button>
                <button class="f-btn" onclick="setCategory('Кафе', this)">Кафе</button>
                <button class="f-btn" onclick="setCategory('Магазини', this)">Магазини</button>
                <button class="f-btn" onclick="setCategory('Послуги', this)">Послуги</button>
            </div>
            <div class="controls-row">
                <select id="houseFilter" onchange="filterData()">
                    <option value="Всі">Всі будинки</option>
                </select>
                <label class="switch-container">
                    <input type="checkbox" id="openNowFilter" onchange="filterData()"> 
                    <span>Зараз відчинено</span>
                </label>
            </div>
        </div>
    </header>

    <main id="mainContent">
        <button class="main-map-btn" onclick="openMapModal()">
            🏠 Знайти будинок
        </button>
        <div id="businessContainer"></div>
    </main>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <div id="modalData"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
